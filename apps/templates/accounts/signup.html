<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astabaya - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <style>
      /* Gaya Kustom yang Tidak Ada di Bootstrap */
      body {
        /* Menggabungkan gaya kustom background */
        font-family: "Poppins", sans-serif;
        text-align: center;
        background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{% static 'img/background-login-register.jpg' %}") no-repeat center center;
        background-size: cover;
        background-position: center;
        min-height: 100vh; /* Agar mengisi seluruh tinggi viewport */
        color: white;
      }

      /* Container Box kustom */
      .custom-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 20px 40px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      }

      /* Gaya kustom untuk input agar sesuai dengan tampilan lama */
      .form-control-custom {
        background: rgba(249, 242, 242, 0.93);
        color: rgb(30, 29, 29);
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 16px;
      }
      .form-control-custom::placeholder {
        color: #a0c3cfff;
      }

      /* Gaya kustom untuk tombol Sign Up */
      .btn-signup-custom {
        background: linear-gradient(90deg, #ff416c, #ff4b2b);
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-signup-custom:hover {
        transform: scale(1.05);
        background: linear-gradient(90deg, #ff4b2b, #ff416c);
      }

      /* Gaya kustom untuk tombol Login */
      .btn-login-custom {
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: bold;
        text-decoration: none;
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center">
    <div class="custom-container w-100" style="max-width: 400px">
      <img src="{% static 'icon/A-removebg-preview.png' %}" alt="Logo Astabaya" class="img-fluid mb-3" style="width: 250px; height: auto" />

      <h2 class="text-white mb-4">Create Your Account</h2>

      <form id="signup-form" class="d-flex flex-column gap-3">
        {% csrf_token %}
        <div class="text-start">
          <label for="username" class="form-label visually-hidden">Username</label>
          <input type="text" name="username" placeholder="Username" required class="form-control form-control-custom" />
        </div>

        <div class="text-start">
          <label for="email" class="form-label visually-hidden">Email</label>
          <input type="email" name="email" placeholder="Email" required class="form-control form-control-custom" />
        </div>

        <div class="text-start">
          <label for="password1" class="form-label visually-hidden">Password</label>
          <input type="password" name="password" placeholder="Password" required class="form-control form-control-custom" />
        </div>

        <p id="password-error" class="error-message">⚠️ Password must be at least 8 characters and not too common.</p>

        <button type="submit" class="btn btn-signup-custom w-100 mt-2">Sign Up</button>
      </form>

      <div class="login-section mt-4 pt-2 border-top border-secondary">
        <p class="mb-2" style="font-size: 14px">Already have an account? <a href="{% url 'login' %}" class="btn-login-custom">Login</a></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script>
      document.getElementById("signup-form").addEventListener("submit", async function (event) {
        event.preventDefault(); // Mencegah form dari submit default

        const form = event.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        const csrfToken = data.csrfmiddlewaretoken;

        const passwordError = document.getElementById("password-error");
        passwordError.style.display = "none"; // Sembunyikan pesan error sebelumnya

        try {
          const response = await fetch("{% url 'api-register' %}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken,
            },
            body: JSON.stringify(data),
          });

          if (response.ok) {
            // Jika registrasi berhasil (status 201 CREATED)
            alert("Registration successful! Please log in.");
            window.location.href = "{% url 'login' %}"; // Arahkan ke halaman login
          } else {
            // Jika ada error dari server
            const errorData = await response.json();
            const errorMessage = Object.values(errorData).flat().join("\n");
            passwordError.textContent = `⚠️ ${errorMessage}`;
            passwordError.style.display = "block";
          }
        } catch (error) {
          console.error("Error:", error);
          passwordError.textContent = "⚠️ An unexpected error occurred. Please try again.";
          passwordError.style.display = "block";
        }
      });
    </script>
  </body>
</html>
