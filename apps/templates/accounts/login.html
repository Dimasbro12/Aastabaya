<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      /* General Styles */
      body {
        font-family: "Poppins", sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #a0c3cfff, #a0c3cfff);
        margin: 0;
        padding: 50px;
        color: white;
      }

      /* Container Box */
      .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        display: inline-block;
        width: 350px;
      }

      h2 {
        color: white;
        margin-bottom: 15px;
      }

      /* Form Styles */
      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        background: rgba(249, 242, 242, 0.93);
        color: rgb(30, 29, 29);
      }

      input::placeholder {
        color: #a0c3cfff;
      }

      /* Button Styles */
      button {
        background: linear-gradient(90deg, #ff416c, #ff4b2b);
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        background: linear-gradient(90deg, #ff4b2b, #ff416c);
      }

      /* Forgot Password */
      .forgot-password {
        margin-top: 10px;
        font-size: 14px;
      }

      .forgot-password a {
        color: #ffcc00;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      .forgot-password a:hover {
        text-decoration: underline;
      }
      img {
        border-radius: 20px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="{% static 'icon/LogoAstabaya-removebg-preview.png' %}" alt="Logo Astabaya" width="150" />
      <h2>Login to Your Account</h2>
      <p id="login-error" class="error-message" style="color: red; display: none"></p>
      <form id="login-form">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <!-- Forgot Password -->
      {% comment %}
      <div class="forgot-password">
        <a href="{% url 'password_reset' %}">Forgot Password?</a>
      </div>
      {% endcomment %}
    </div>

    <script>
      document.getElementById("login-form").addEventListener("submit", async function (event) {
        event.preventDefault(); // Mencegah form dari submit default

        const form = event.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        const csrfToken = data.csrfmiddlewaretoken;

        const loginError = document.getElementById("login-error");
        loginError.style.display = "none";

        try {
          const response = await fetch("{% url 'api-login' %}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken,
            },
            body: JSON.stringify(data),
          });

          const responseData = await response.json();

          if (response.ok) {
            localStorage.setItem("authToken", responseData.token); // Simpan token
            window.location.href = "{% url 'index' %}"; // Arahkan ke halaman utama
          } else {
            loginError.textContent = `⚠️ ${responseData.error || "Login failed."}`;
            loginError.style.display = "block";
          }
        } catch (error) {
          loginError.textContent = "⚠️ An unexpected error occurred. Please try again.";
          loginError.style.display = "block";
        }
      });
    </script>
  </body>
</html>
